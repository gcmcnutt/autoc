# Goal: Train with varied entry conditions and wind directions
# See specs/VARIATIONS1.md for full rationale

PopulationSize                  = 500
NumberOfGenerations             = 100
CreationType                    = 2
CrossoverProbability            = 80
CreationProbability             = 20
MaximumDepthForCreation         = 8
MaximumDepthForCrossover        = 12
SelectionType                   = 1
TournamentSize                  = 5
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
SwapMutationProbability         = 15
ShrinkMutationProbability       = 12
AddBestToNewPopulation          = 1
SteadyState                     = 0

SimNumPathsPerGeneration        = 1
EvalThreads                     = 8

# =============================================================================
# SCENARIO VARIATIONS (VARIATIONS1)
# =============================================================================
# Scenarios with Gaussian-distributed entry/wind variations
WindScenarios                   = 9

# Entry and wind variations (requires crrcsim support - see VARIATIONS1.md)
# 1=enabled, 0=disabled
EnableEntryVariations           = 1
EnableWindVariations            = 0

# Gaussian σ values (in DEGREES for readability, converted to radians in code)
# Entry heading: σ=45°, so 68% within ±45°, 95% within ±90°
EntryHeadingSigma               = 45
# Entry roll: σ=22.5°, so 68% within ±22.5°, 95% within ±45°
EntryRollSigma                  = 22.5
# Entry pitch: σ=7.5°, so 68% within ±7.5°, 95% within ±15°
EntryPitchSigma                 = 7.5
# Entry speed: σ=10%, so 68% within ±10%, 95% within ±20%
EntrySpeedSigma                 = 0.1

# Wind direction: σ=45° around base (330° from autoc_config.xml)
WindDirectionSigma              = 45

# Variation landscape ramp (see specs/RAMP_LANDSCAPE.md)
# Scale variation sigmas from 0→1 over training to ease learning
# 0 = disabled (full sigmas from start), >0 = generations per step
# Example: 100 gens, step=5 → 20 steps, scale increases 5% each step
VariationRampStep               = 5

# =============================================================================
# VARIABLE RABBIT SPEED (see specs/ZZZ-VARIABLE_RABBIT.md)
# =============================================================================
# Set RabbitSpeedSigma=0 for constant speed at RabbitSpeedNominal (legacy behavior)
# Non-zero sigma enables smooth Gaussian-distributed speed variations
RabbitSpeedNominal              = 16.0    # m/s - center of distribution
RabbitSpeedSigma                = 0.0     # m/s - 1σ deviation (0 = constant speed)
RabbitSpeedMin                  = 8.0     # m/s - hard floor
RabbitSpeedMax                  = 25.0    # m/s - hard ceiling
RabbitSpeedCycleMin             = 0.5     # seconds - min variation cycle
RabbitSpeedCycleMax             = 5.0     # seconds - max variation cycle

# random, classic, line, computedPaths, longSequential, aeroStandard, progressiveDistance
PathGeneratorMethod             = longSequential

# Seeded random path generation
RandomPathSeedB                 = 13337

# GP initialization seed (-1 for random)
GPSeed                          = -1

MinisimPortOverride             = 0
MinisimProgram                  = ./crrcsim.sh
S3Bucket                        = autoc-storage
S3Profile                       = minio

# Evaluation mode: 0=normal GP evolution, 1=bytecode verification
EvaluateMode                    = 0
BytecodeFile                    = gp_program.dat

# =============================================================================
# EXPANDED NODE SET (23 nodes) for VARIATIONS1
# =============================================================================
# Adds state feedback nodes needed for recovery from off-nominal entries:
#   GETROLL_RAD  - direct roll feedback (radians)
#   GETPITCH_RAD - direct pitch feedback (radians)
#   GETVEL       - airspeed for energy management (m/s)
#
# Temporal nodes for PID-like control (see specs/TEMPORAL_STATE.md):
#   GETDPHI_PREV   - historical phi error (history index as arg)
#   GETDTHETA_PREV - historical theta error (history index as arg)
#   GETDPHI_RATE   - rate of change of phi error (nullary)
#   GETDTHETA_RATE - rate of change of theta error (nullary)
#
# Base set (16 nodes from minimal):
#   OUTPUTS (3): SETPITCH, SETROLL, SETTHROTTLE
#   INPUTS (3):  GETDPHI, GETDTHETA, GETDTARGET - path-relative errors
#   MATH (4):    ADD, SUB, MUL, DIV
#   LOGIC (2):   IF, GT
#   CONSTANTS (3): 0, 1, 2
#   FLOW (1):    PROGN
# =============================================================================
TrainingNodes                   = SETPITCH,SETROLL,SETTHROTTLE,GETDPHI,GETDTHETA,GETDTARGET,GETDPHI_PREV,GETDTHETA_PREV,GETDPHI_RATE,GETDTHETA_RATE,ADD,SUB,MUL,DIV,IF,GT,0,1,2,PROGN,GETROLL_RAD,GETPITCH_RAD,GETVEL
