# Goal: Train with varied entry conditions and wind directions
# See specs/VARIATIONS1.md for full rationale

PopulationSize                  = 5000
NumberOfGenerations             = 200
CreationType                    = 2
CrossoverProbability            = 80
CreationProbability             = 20
MaximumDepthForCreation         = 8
MaximumDepthForCrossover        = 16
SelectionType                   = 1
TournamentSize                  = 5
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
SwapMutationProbability         = 15
ShrinkMutationProbability       = 12
AddBestToNewPopulation          = 1
SteadyState                     = 0

SimNumPathsPerGeneration        = 1
EvalThreads                     = 20

# =============================================================================
# SCENARIO VARIATIONS (VARIATIONS1)
# =============================================================================
# Scenarios with Gaussian-distributed entry/wind variations
WindScenarios                   = 49

# Entry and wind variations (requires crrcsim support - see VARIATIONS1.md)
# 1=enabled, 0=disabled
EnableEntryVariations           = 0
EnableWindVariations            = 1

# Gaussian σ values (in DEGREES for readability, converted to radians in code)
# Entry heading: σ=45°, so 68% within ±45°, 95% within ±90°
EntryHeadingSigma               = 45
# Entry roll: σ=22.5°, so 68% within ±22.5°, 95% within ±45°
EntryRollSigma                  = 22.5
# Entry pitch: σ=7.5°, so 68% within ±7.5°, 95% within ±15°
EntryPitchSigma                 = 7.5
# Entry speed: σ=10%, so 68% within ±10%, 95% within ±20%
EntrySpeedSigma                 = 0.1

# Wind direction: σ=45° around base (330° from autoc_config.xml)
WindDirectionSigma              = 45

# Entry position: σ in meters (0=disabled, see specs/005-entry-fitness-ramp)
# Radius: half-normal distribution, uniform angle → N/E offset
# Altitude: Gaussian offset (NED Down), clamped to safe arena bounds
EntryPositionRadiusSigma        = 0
EntryPositionAltSigma           = 0

# Variation landscape ramp (see specs/RAMP_LANDSCAPE.md)
# Scale variation sigmas from 0→1 over training to ease learning
# 0 = disabled (full sigmas from start), >0 = generations per step
# Example: 100 gens, step=5 → 20 steps, scale increases 5% each step
VariationRampStep               = 0

# =============================================================================
# VARIABLE RABBIT SPEED (see specs/ZZZ-VARIABLE_RABBIT.md)
# =============================================================================
# Set RabbitSpeedSigma=0 for constant speed at RabbitSpeedNominal (legacy behavior)
# Non-zero sigma enables smooth Gaussian-distributed speed variations
RabbitSpeedNominal              = 16.0    # m/s - center of distribution
RabbitSpeedSigma                = 3.0     # m/s - 1σ deviation (0 = constant speed)
RabbitSpeedMin                  = 8.0     # m/s - hard floor
RabbitSpeedMax                  = 25.0    # m/s - hard ceiling
RabbitSpeedCycleMin             = 0.5     # seconds - min variation cycle
RabbitSpeedCycleMax             = 5.0     # seconds - max variation cycle

# random, classic, line, computedPaths, longSequential, aeroStandard, progressiveDistance
PathGeneratorMethod             = progressiveDistance

# Seeded random path generation
RandomPathSeedB                 = 13337

# GP initialization seed (-1 for random)
GPSeed                          = -1

MinisimPortOverride             = 0
MinisimProgram                  = ./crrcsim.sh
S3Bucket                        = autoc-storage
; S3Profile                       = minio

# Evaluation mode: 0=normal GP evolution, 1=bytecode verification
EvaluateMode                    = 0
BytecodeFile                    = gp_program.dat

# =============================================================================
# CONTROLLER TYPE (see specs/013-neuroevolution)
# =============================================================================
# "GP" = genetic programming tree evolution (default)
# "NN" = neural network neuroevolution
ControllerType                  = NN

# NN-specific parameters (ignored when ControllerType=GP)
NNTopology                      = 14,16,8,3
NNMutationSigma                 = 0.1
NNCrossoverAlpha                = -1
; NNWeightFile                    = nn_weights.dat
NNInitMethod                    = xavier

# =============================================================================
# NODE SET REFERENCE (all available nodes)
# =============================================================================
# OUTPUTS (3):   SETPITCH, SETROLL, SETTHROTTLE
# PATH SENSORS (2): GETDPHI(step), GETDTHETA(step) - rabbit-relative angular errors
# DISTANCE (3):   GETDIST - raw distance to rabbit (m); GETDIST_PREV(n) - history; GETDIST_RATE - rate (m/s)
# NAV SENSORS (2):  GETDHOME - distance to origin; GETVEL - airspeed magnitude
# ATTITUDE (2):     GETROLL_RAD, GETPITCH_RAD - current attitude in radians
# AoA/SLIP (2):     GETALPHA - angle of attack; GETBETA - sideslip angle
# BODY VEL (3):     GETVELX, GETVELY, GETVELZ - NED velocity components
# TEMPORAL (4):     GETDPHI_PREV(n), GETDTHETA_PREV(n) - history; GETDPHI_RATE, GETDTHETA_RATE - derivatives
# MATH (4):         ADD, SUB, MUL, DIV
# MATH EXT (6):     CLAMP(x,lo,hi), ABS, SQRT, MIN, MAX, ATAN2
# TRIG (2):         SIN, COS
# LOGIC (3):        IF, GT, EQ
# CONSTANTS (4):    0, 1, 2, PI
# FLOW (1):         PROGN
# DEPRECATED:       GETDTARGET(step) - composite (distance-10)/speed signal, replaced by
#                   cleaner GETDIST primitives. Opcode retained for backward compatibility.
# =============================================================================
# Currently enabled (27 nodes):
#   Replaced GETDTARGET with GETDIST + GETDIST_PREV + GETDIST_RATE (net +2)
# =============================================================================
TrainingNodes                   = SETPITCH,SETROLL,SETTHROTTLE,GETDPHI,GETDTHETA,GETDIST,GETDIST_PREV,GETDIST_RATE,GETDPHI_PREV,GETDTHETA_PREV,GETDPHI_RATE,GETDTHETA_RATE,ADD,SUB,MUL,DIV,IF,GT,0,1,2,PROGN,GETROLL_RAD,GETPITCH_RAD,GETVEL,CLAMP,ABS
