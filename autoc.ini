# autoc.ini — NN neuroevolution configuration
# See specs/015-nn-training-improvements

# =============================================================================
# EVOLUTION PARAMETERS
# =============================================================================
PopulationSize                  = 3500
NumberOfGenerations             = 400
CrossoverProbability            = 95        # % crossover+mutation
CreationProbability             = 5         # % fresh random individuals (was 20)
TournamentSize                  = 5
SwapMutationProbability         = 15        # % mutation-only (no crossover)
AddBestToNewPopulation          = 1         # elitism count

# NN-specific
NNMutationSigma                 = 0.2       # initial mutation sigma
NNSigmaFloor                    = 0.05      # minimum sigma (0 = disabled)
NNCrossoverAlpha                = -1        # BLX-alpha (-1 = uniform random per weight)
NNInitMethod                    = xavier    # "xavier" or "uniform"

# Selection strategy (015): "sum" (legacy), "minimax", "lexicase"
SelectionMode                   = lexicase

# =============================================================================
# SIMULATION
# =============================================================================
SimNumPathsPerGeneration        = 5         # skip the random path
EvalThreads                     = 20

# Path generation: random, classic, line, computedPaths, longSequential,
#                  aeroStandard, progressiveDistance
PathGeneratorMethod             = aeroStandard

# Seeded random path generation
RandomPathSeedB                 = 13337

# RNG seed (-1 for time-based, run 3x to distinguish pattern from fluke)
Seed                            = -1

# Minisim worker configuration
MinisimPortOverride             = 0
MinisimProgram                  = ./scripts/crrcsim.sh

# =============================================================================
# SCENARIO VARIATIONS
# =============================================================================
# Wind scenario count (each with different wind seed for thermals/gusts)
# 49 winds × 1 progressiveDistance path = 49 flights per individual
WindScenarios                   = 49

# Entry and wind variations (requires crrcsim support)
# 1=enabled, 0=disabled
EnableEntryVariations           = 1
EnableWindVariations            = 1
EnableRabbitSpeedVariations     = 1

# Gaussian sigma values (degrees for readability, converted to radians in code)
# Cone: nose direction deviates within a cone (no gimbal lock / Euler explosion)
EntryConeSigma                  = 30        # half-angle of direction cone (degrees)
EntryRollSigma                  = 30        # roll around body axis
EntrySpeedSigma                 = 0.1       # fraction (10%)
WindDirectionSigma              = 45

# Entry position sigma in meters (0=disabled for xiao-like on-point start)
EntryPositionRadiusSigma        = 0.0
EntryPositionAltSigma           = 0.0

# Variation landscape ramp (0=disabled, >0 = gens per step)
# OFF for baseline — reveals nondeterminism honestly
VariationRampStep               = 40

# =============================================================================
# VARIABLE RABBIT SPEED
# =============================================================================
# Master switch: EnableRabbitSpeedVariations above. When 0, RabbitSpeedSigma
# is forced to 0 regardless of the value below.
RabbitSpeedNominal              = 13.0      # m/s (real cruise with streamer, 50% power)
RabbitSpeedSigma                = 2.0       # m/s (68% within 11-15, real Vmax=17)
RabbitSpeedMin                  = 10.0      # m/s (well above stall ~7, keeps flying)
RabbitSpeedMax                  = 18.0      # m/s (real Vmax ~17, allows slight downhill)
RabbitSpeedCycleMin             = 3.0       # seconds (was 0.5 -- longer holds for distinct speed regimes)
RabbitSpeedCycleMax             = 7.0       # seconds (even short courses get 2-3 speed paradigms)

# =============================================================================
# STORAGE
# =============================================================================
S3Bucket                        = autoc-storage
; S3Profile                     = minio

# =============================================================================
# EVALUATION MODE
# =============================================================================
# 0 = normal NN evolution, 1 = evaluate saved weight file
EvaluateMode                    = 0
; NNWeightFile                  = nn_weights.dat

# =============================================================================
# FITNESS: POINT-ACCUMULATION SCORING (022, conical surface V4)
# =============================================================================
# Polar (conical) scoring surface with directional distance and clamped angle:
#   distance     = sqrt(along² + lateral²)
#   angle        = acos(-along / distance)   [0 = behind, π = ahead]
#   angle_clamp  = min(angle, π/2)           [ahead saturates at "sideways"]
#   dist_scale   = behind or ahead based on along sign
#   score        = 1 / (1 + (dist/dist_scale)² + (angle_clamp/cone)²)
#
# Tail-chase rewarded · lateral pinched (gravity fix) · ahead has real gradient
# (small distScaleAhead makes the distance term sharply penalize overshoots).
# See specs/022-tracking-cone-fitness/development-report.md for design history.
FitDistScaleBehind              = 7.0       # distance scale behind rabbit (m: -7m back = 0.5 threshold)
FitDistScaleAhead               = 2.0       # distance scale ahead of rabbit (m, sharp)
FitConeAngleDeg                 = 45.0      # angular half-decay from tail-chase line (deg)
FitStreakThreshold              = 0.5       # min stepPoints to maintain streak
FitStreakRampSec                = 5.0       # seconds to reach max multiplier
FitStreakMultiplierMax          = 5.0       # maximum streak multiplier (1x base + 4x bonus)

# =============================================================================
# DEMETIC GROUPING (scenario assignment)
# =============================================================================
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
