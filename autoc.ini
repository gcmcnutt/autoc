# Configuration (default values), created by class configuration)
PopulationSize                  = 5000
NumberOfGenerations             = 200
CreationType                    = 2
CrossoverProbability            = 95
CreationProbability             = 10
MaximumDepthForCreation         = 14
MaximumDepthForCrossover        = 18
SelectionType                   = 1
TournamentSize                  = 60
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
SwapMutationProbability         = 5
ShrinkMutationProbability       = 5
AddBestToNewPopulation          = 1
SteadyState                     = 0

SimNumPathsPerGeneration        = 1
EvalThreads                     = 8
WindScenarios                   = 9
WindSeedBase                    = 12121
WindSeedStride                  = 11

# random, classic, line, computedPaths, longSequential, aeroStandard, progressiveDistance
PathGeneratorMethod             = progressiveDistance

# Seeded random path generation
# Use -1 for time-based random seed, or any other value for reproducible paths
RandomPathSeedB                 = 13337

# GP initialization seed
# Use -1 for time-based random seed, or any other value for reproducible runs
GPSeed                          = 1769627279

MinisimPortOverride             = 0
MinisimProgram                  = ./crrcsim.sh
S3Bucket                        = autoc-storage
S3Profile                       = minio

# Evaluation mode: 0=normal GP evolution, 1=bytecode verification
EvaluateMode                    = 0
BytecodeFile                    = gp_program.dat

# Training node mask: comma-separated list of node names to use during tree creation/mutation
# Empty or missing = use all nodes (backward compatible)
# Full set for verification: ADD,SUB,MUL,DIV,IF,EQ,GT,SETPITCH,SETROLL,SETTHROTTLE,GETPITCH,GETROLL,GETTHROTTLE,SIN,COS,OP_PI,0,1,2,PROGN,GETDPHI,GETDTHETA,GETDTARGET,GETVEL,GETDHOME,GETALPHA,GETBETA,GETVELX,GETVELY,GETVELZ,GETROLL_RAD,GETPITCH_RAD,CLAMP,ATAN2,ABS,SQRT,MIN,MAX
# Minimal set: SETPITCH,SETROLL,SETTHROTTLE,GETDPHI,GETDTHETA,GETDTARGET,IF,GT,ADD,MUL,0,1,PROGN
TrainingNodes                   = ADD,SUB,MUL,DIV,IF,EQ,GT,SETPITCH,SETROLL,SETTHROTTLE,GETPITCH,GETROLL,GETTHROTTLE,SIN,COS,OP_PI,0,1,2,PROGN,GETDPHI,GETDTHETA,GETDTARGET,GETVEL,GETDHOME,GETALPHA,GETBETA,GETVELX,GETVELY,GETVELZ,GETROLL_RAD,GETPITCH_RAD,CLAMP,ATAN2,ABS,SQRT,MIN,MAX
