# autoc.ini — NN neuroevolution configuration
# See specs/015-nn-training-improvements

# =============================================================================
# EVOLUTION PARAMETERS
# =============================================================================
PopulationSize                  = 3000
NumberOfGenerations             = 400
CrossoverProbability            = 95        # % crossover+mutation
CreationProbability             = 5         # % fresh random individuals (was 20)
TournamentSize                  = 5
SwapMutationProbability         = 15        # % mutation-only (no crossover)
AddBestToNewPopulation          = 1         # elitism count

# NN-specific
NNMutationSigma                 = 0.2       # initial mutation sigma
NNSigmaFloor                    = 0.05      # minimum sigma (0 = disabled)
NNCrossoverAlpha                = -1        # BLX-alpha (-1 = uniform random per weight)
NNInitMethod                    = xavier    # "xavier" or "uniform"

# Selection strategy (015): "sum" (legacy), "minimax", "lexicase"
SelectionMode                   = lexicase

# =============================================================================
# SIMULATION
# =============================================================================
SimNumPathsPerGeneration        = 6
EvalThreads                     = 20

# Path generation: random, classic, line, computedPaths, longSequential,
#                  aeroStandard, progressiveDistance
PathGeneratorMethod             = aeroStandard

# Seeded random path generation
RandomPathSeedB                 = 13337

# RNG seed (-1 for time-based, run 3x to distinguish pattern from fluke)
Seed                            = -1

# Minisim worker configuration
MinisimPortOverride             = 0
MinisimProgram                  = ./scripts/crrcsim.sh

# =============================================================================
# SCENARIO VARIATIONS
# =============================================================================
# Wind scenario count (each with different wind seed for thermals/gusts)
# 49 winds × 1 progressiveDistance path = 49 flights per individual
WindScenarios                   = 49

# Entry and wind variations (requires crrcsim support)
# 1=enabled, 0=disabled
EnableEntryVariations           = 1
EnableWindVariations            = 1

# Gaussian sigma values (degrees for readability, converted to radians in code)
EntryHeadingSigma               = 45        # 68% within +/-45 deg
EntryRollSigma                  = 22.5
EntryPitchSigma                 = 7.5
EntrySpeedSigma                 = 0.1       # fraction (10%)
WindDirectionSigma              = 45

# Entry position sigma in meters (0=disabled)
EntryPositionRadiusSigma        = 20
EntryPositionAltSigma           = 3       # was 5 — narrowed to reduce unrecoverable dive+deck crashes

# Variation landscape ramp (0=disabled, >0 = gens per step)
# OFF for baseline — reveals nondeterminism honestly
VariationRampStep               = 0

# =============================================================================
# VARIABLE RABBIT SPEED
# =============================================================================
# Set RabbitSpeedSigma=0 for constant speed (legacy behavior)
RabbitSpeedNominal              = 16.0      # m/s (~60% power cruise)
RabbitSpeedSigma                = 4.0       # m/s (68% within 12-20, pronounced variation)
RabbitSpeedMin                  = 8.0       # m/s (just above stall ~7 m/s)
RabbitSpeedMax                  = 25.0      # m/s
RabbitSpeedCycleMin             = 3.0       # seconds (was 0.5 -- longer holds for distinct speed regimes)
RabbitSpeedCycleMax             = 7.0       # seconds (even short courses get 2-3 speed paradigms)

# =============================================================================
# STORAGE
# =============================================================================
S3Bucket                        = autoc-storage
; S3Profile                     = minio

# =============================================================================
# EVALUATION MODE
# =============================================================================
# 0 = normal NN evolution, 1 = evaluate saved weight file
EvaluateMode                    = 0
; NNWeightFile                  = nn_weights.dat

# =============================================================================
# DEMETIC GROUPING (scenario assignment)
# =============================================================================
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
