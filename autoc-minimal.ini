# MINIMAL NODE SET EXPERIMENT
# Goal: Reduce search space to find basic control faster
# Then layer on complexity once basic control is established

PopulationSize                  = 3000
NumberOfGenerations             = 200
CreationType                    = 2
CrossoverProbability            = 90
CreationProbability             = 15
MaximumDepthForCreation         = 8
MaximumDepthForCrossover        = 10
SelectionType                   = 1
TournamentSize                  = 7
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
SwapMutationProbability         = 10
ShrinkMutationProbability       = 10
AddBestToNewPopulation          = 1
SteadyState                     = 0

SimNumPathsPerGeneration        = 1
EvalThreads                     = 8
WindScenarios                   = 9
WindSeedBase                    = 12121
WindSeedStride                  = 11

# random, classic, line, computedPaths, longSequential, aeroStandard, progressiveDistance
PathGeneratorMethod             = progressiveDistance

# Seeded random path generation
RandomPathSeedB                 = 13337

# GP initialization seed (-1 for random)
GPSeed                          = -1

MinisimPortOverride             = 0
MinisimProgram                  = ./crrcsim.sh
S3Bucket                        = autoc-storage
S3Profile                       = minio

# Evaluation mode: 0=normal GP evolution, 1=bytecode verification
EvaluateMode                    = 0
BytecodeFile                    = gp_program.dat

# =============================================================================
# MINIMAL NODE SET (16 nodes vs 38)
# =============================================================================
# Rationale:
#   OUTPUTS (3): SETPITCH, SETROLL, SETTHROTTLE - must have all actuators
#   INPUTS (3):  GETDPHI, GETDTHETA, GETDTARGET - path-relative errors (most useful)
#   MATH (4):    ADD, SUB, MUL, DIV - basic arithmetic
#   LOGIC (2):   IF, GT - conditional control
#   CONSTANTS (3): 0, 1, 2 - basic scaling
#   FLOW (1):    PROGN - sequencing
#
# EXCLUDED for now:
#   - Trig (SIN, COS, ATAN2) - can add back for refined control
#   - State feedback (GETPITCH, GETROLL, GETTHROTTLE) - closed-loop later
#   - Raw velocities (GETVELX/Y/Z, GETVEL) - higher-level nodes better
#   - Attitude (GETALPHA, GETBETA, GETROLL_RAD, GETPITCH_RAD) - redundant with GETD*
#   - Utilities (CLAMP, ABS, SQRT, MIN, MAX, EQ) - can layer in
#   - PI, GETDHOME - rarely useful in basic control
# =============================================================================
TrainingNodes                   = SETPITCH,SETROLL,SETTHROTTLE,GETDPHI,GETDTHETA,GETDTARGET,ADD,SUB,MUL,DIV,IF,GT,0,1,2,PROGN
