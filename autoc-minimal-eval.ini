# MINIMAL NODE SET - BYTECODE EVALUATION MODE
# Verify that a trained minimal-node GP program evaluates correctly
# Uses EvaluateMode=1 to run bytecode verification against gp_program.dat

PopulationSize                  = 1
NumberOfGenerations             = 1
CreationType                    = 2
CrossoverProbability            = 90
CreationProbability             = 15
MaximumDepthForCreation         = 8
MaximumDepthForCrossover        = 10
SelectionType                   = 1
TournamentSize                  = 7
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
SwapMutationProbability         = 10
ShrinkMutationProbability       = 10
AddBestToNewPopulation          = 1
SteadyState                     = 0

SimNumPathsPerGeneration        = 6
EvalThreads                     = 1
WindScenarios                   = 6
WindSeedBase                    = 12121
WindSeedStride                  = 11

# random, classic, line, computedPaths, longSequential, aeroStandard, progressiveDistance
PathGeneratorMethod             = aeroStandard

# Seeded random path generation
RandomPathSeedB                 = 13337

# GP initialization seed (-1 for random)
GPSeed                          = -1

MinisimPortOverride             = 0
MinisimProgram                  = ./crrcsim.sh
S3Bucket                        = autoc-eval
S3Profile                       = minio

# Evaluation mode: 0=normal GP evolution, 1=bytecode verification
EvaluateMode                    = 1
BytecodeFile                    = gp_program.dat

# =============================================================================
# MINIMAL NODE SET (16 nodes vs 38)
# =============================================================================
# IMPORTANT: For bytecode verification, TrainingNodes should be empty or
# contain ALL nodes so the evaluator can handle any opcode in the bytecode.
# The bytecode was trained with the minimal set, but evaluation needs all
# opcodes available for the portable evaluator to work.
# =============================================================================
TrainingNodes                   =
