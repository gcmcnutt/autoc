# autoc-eval.ini — NN evaluation mode
# Evaluates a saved weight file against novel scenarios.
# Use: ./build/autoc -i autoc-eval.ini
# T180: progressiveDistance (novel geometry, never seen in aeroStandard training)
# T181: longSequential (duration/stability test)
# T182: random paths (full generalization test)

# =============================================================================
# EVOLUTION PARAMETERS (not used in eval mode, but parsed)
# =============================================================================
PopulationSize                  = 1
NumberOfGenerations             = 1
CrossoverProbability            = 95
CreationProbability             = 5
TournamentSize                  = 5
SwapMutationProbability         = 15
AddBestToNewPopulation          = 1

# NN-specific
NNMutationSigma                 = 0.2
NNSigmaFloor                    = 0.05
NNCrossoverAlpha                = -1
NNInitMethod                    = xavier

# Selection strategy
SelectionMode                   = lexicase

# =============================================================================
# SIMULATION
# =============================================================================
SimNumPathsPerGeneration        = 1
EvalThreads                     = 20

# Path generation — T184: quiet throttle baseline (single calm flight)
PathGeneratorMethod             = longSequential

# Seeded random path generation
RandomPathSeedB                 = 99999       # novel seed, never seen in training

# RNG seed — randomised so wind seeds differ from training set
Seed                            = -1

# Minisim worker configuration
MinisimPortOverride             = 0
MinisimProgram                  = ./scripts/crrcsim.sh

# =============================================================================
# SCENARIO VARIATIONS
# =============================================================================
# Single quiet scenario
WindScenarios                   = 1

# No variations — calm baseline
EnableEntryVariations           = 0
EnableWindVariations            = 0

# Gaussian sigma values at 120% of training (stress test)
EntryHeadingSigma               = 54         # 45 * 1.20
EntryRollSigma                  = 27         # 22.5 * 1.20
EntryPitchSigma                 = 9          # 7.5 * 1.20
EntrySpeedSigma                 = 0.12       # 0.10 * 1.20
WindDirectionSigma              = 54         # 45 * 1.20

# Entry position sigma in meters at 120%
EntryPositionRadiusSigma        = 24         # 20 * 1.20
EntryPositionAltSigma           = 6          # 5 * 1.20

# No ramp — full variations from the start
VariationRampStep               = 0

# =============================================================================
# VARIABLE RABBIT SPEED
# =============================================================================
RabbitSpeedNominal              = 12.0      # m/s — slow cruise, no variation
RabbitSpeedSigma                = 0.0       # constant speed
RabbitSpeedMin                  = 8.0       # m/s
RabbitSpeedMax                  = 25.0      # m/s
RabbitSpeedCycleMin             = 3.0       # seconds — match training
RabbitSpeedCycleMax             = 7.0       # seconds — match training

# =============================================================================
# STORAGE
# =============================================================================
S3Bucket                        = autoc-eval-arm
; S3Profile                     = minio

# =============================================================================
# EVALUATION MODE
# =============================================================================
# 0 = normal NN evolution, 1 = evaluate saved weight file
EvaluateMode                    = 1
NNWeightFile                    = nn_weights.dat

# =============================================================================
# DEMETIC GROUPING (scenario assignment)
# =============================================================================
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
