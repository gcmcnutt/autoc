# autoc-eval.ini — NN evaluation mode
# Evaluates a saved weight file against novel scenarios.
# Use: ./build/autoc -i autoc-eval.ini
# T180: progressiveDistance (novel geometry, never seen in aeroStandard training)
# T181: longSequential (duration/stability test)
# T182: random paths (full generalization test)

# =============================================================================
# EVOLUTION PARAMETERS (not used in eval mode, but parsed)
# =============================================================================
PopulationSize                  = 1
NumberOfGenerations             = 1
CrossoverProbability            = 95
CreationProbability             = 5
TournamentSize                  = 5
SwapMutationProbability         = 15
AddBestToNewPopulation          = 1

# NN-specific
NNMutationSigma                 = 0.2
NNSigmaFloor                    = 0.05
NNCrossoverAlpha                = -1
NNInitMethod                    = xavier

# Selection strategy
SelectionMode                   = lexicase

# =============================================================================
# SIMULATION
# =============================================================================
SimNumPathsPerGeneration        = 6
EvalThreads                     = 8

# Path generation — match BIG-3 training config
PathGeneratorMethod             = aeroStandard

# Seeded random path generation
RandomPathSeedB                 = 13337       # must match training for exact repro

# RNG seed — randomised so wind seeds differ from training set
Seed                            = 1773977584   # BIG-3 training seed

# Minisim worker configuration
MinisimPortOverride             = 0
MinisimProgram                  = ./scripts/crrcsim.sh

# =============================================================================
# SCENARIO VARIATIONS — matched to BIG-3 training (autoc.ini)
# =============================================================================
WindScenarios                   = 49

EnableEntryVariations           = 1
EnableWindVariations            = 1

# Entry sigmas — must match training exactly
EntryConeSigma                  = 30
EntryRollSigma                  = 22.5
EntrySpeedSigma                 = 0.1        # fraction (10%), NOT absolute m/s
WindDirectionSigma              = 45

# Entry position sigma in meters
EntryPositionRadiusSigma        = 20
EntryPositionAltSigma           = 3          # narrowed from 5 in BIG-3

# No ramp — full variations from the start
VariationRampStep               = 0

# =============================================================================
# VARIABLE RABBIT SPEED — match BIG-3 training
# =============================================================================
RabbitSpeedNominal              = 13.0      # m/s (real cruise with streamer, 50% power)
RabbitSpeedSigma                = 2.0       # m/s (68% within 11-15, real Vmax=17)
RabbitSpeedMin                  = 10.0      # m/s (well above stall)
RabbitSpeedMax                  = 18.0      # m/s (real Vmax ~17, slight downhill margin)
RabbitSpeedCycleMin             = 3.0       # seconds
RabbitSpeedCycleMax             = 7.0       # seconds

# =============================================================================
# STORAGE
# =============================================================================
S3Bucket                        = autoc-eval-arm
; S3Profile                     = minio

# =============================================================================
# EVALUATION MODE
# =============================================================================
# 0 = normal NN evolution, 1 = evaluate saved weight file
EvaluateMode                    = 1
NNWeightFile                    = nn_weights.dat

# =============================================================================
# DEMETIC GROUPING (scenario assignment)
# =============================================================================
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
