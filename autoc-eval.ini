# autoc-eval.ini — NN evaluation mode
# Evaluates a saved weight file against 49 wind seeds, same path as training.
# Use: ./build/autoc -i autoc-eval.ini
# Phase 1: longSequential (same geometry as training baseline)
# Phase 2: switch PathGeneratorMethod to aeroStandard to test transfer

# =============================================================================
# EVOLUTION PARAMETERS (not used in eval mode, but parsed)
# =============================================================================
PopulationSize                  = 1
NumberOfGenerations             = 1
CrossoverProbability            = 95
CreationProbability             = 5
TournamentSize                  = 5
SwapMutationProbability         = 15
AddBestToNewPopulation          = 1

# NN-specific
NNMutationSigma                 = 0.2
NNSigmaFloor                    = 0.05
NNCrossoverAlpha                = -1
NNInitMethod                    = xavier

# Selection strategy
SelectionMode                   = lexicase

# =============================================================================
# SIMULATION
# =============================================================================
SimNumPathsPerGeneration        = 6
EvalThreads                     = 20

# Path generation — Phase 2: aeroStandard (6 path variants × 30 winds = 180 flights)
PathGeneratorMethod             = aeroStandard

# Seeded random path generation
RandomPathSeedB                 = 13337

# RNG seed — randomised so wind seeds differ from training set
Seed                            = -1

# Minisim worker configuration
MinisimPortOverride             = 0
MinisimProgram                  = ./scripts/crrcsim.sh

# =============================================================================
# SCENARIO VARIATIONS
# =============================================================================
# 30 wind seeds × 6 aeroStandard path variants = 180 flights
WindScenarios                   = 30

# Entry variations ON — same conditions as training
EnableEntryVariations           = 1
EnableWindVariations            = 1

# Gaussian sigma values (degrees for readability, converted to radians in code)
EntryHeadingSigma               = 45
EntryRollSigma                  = 22.5
EntryPitchSigma                 = 7.5
EntrySpeedSigma                 = 0.1
WindDirectionSigma              = 45

# Entry position sigma in meters
EntryPositionRadiusSigma        = 20
EntryPositionAltSigma           = 5

# No ramp — full variations from the start
VariationRampStep               = 0

# =============================================================================
# VARIABLE RABBIT SPEED
# =============================================================================
RabbitSpeedNominal              = 16.0      # m/s
RabbitSpeedSigma                = 3.0       # m/s — match training
RabbitSpeedMin                  = 8.0       # m/s
RabbitSpeedMax                  = 25.0      # m/s
RabbitSpeedCycleMin             = 0.5       # seconds
RabbitSpeedCycleMax             = 5.0       # seconds

# =============================================================================
# STORAGE
# =============================================================================
S3Bucket                        = autoc-eval-arm
; S3Profile                     = minio

# =============================================================================
# EVALUATION MODE
# =============================================================================
# 0 = normal NN evolution, 1 = evaluate saved weight file
EvaluateMode                    = 1
NNWeightFile                    = nn_weights.dat

# =============================================================================
# DEMETIC GROUPING (scenario assignment)
# =============================================================================
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
