# EVAL MODE: Test trained GP against 49 scenarios with entry variations
# Synced from autoc.ini training config + entry variations enabled

PopulationSize                  = 1
NumberOfGenerations             = 1
CreationType                    = 2
CrossoverProbability            = 80
CreationProbability             = 20
MaximumDepthForCreation         = 8
MaximumDepthForCrossover        = 16
SelectionType                   = 1
TournamentSize                  = 5
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
SwapMutationProbability         = 15
ShrinkMutationProbability       = 12
AddBestToNewPopulation          = 1
SteadyState                     = 0

SimNumPathsPerGeneration        = 1
EvalThreads                     = 8

# =============================================================================
# SCENARIO VARIATIONS — eval with full 49 scenarios + entry variations
# =============================================================================
WindScenarios                   = 49

# Both entry AND wind variations enabled (trained on wind only, testing entry robustness)
EnableEntryVariations           = 1
EnableWindVariations            = 1

# Gaussian σ values (in DEGREES for readability, converted to radians in code)
EntryHeadingSigma               = 45
EntryRollSigma                  = 22.5
EntryPitchSigma                 = 7.5
EntrySpeedSigma                 = 0.1
WindDirectionSigma              = 45

# Entry position: σ in meters (see specs/005-entry-fitness-ramp)
EntryPositionRadiusSigma        = 30
EntryPositionAltSigma           = 10

VariationRampStep               = 0

# =============================================================================
# VARIABLE RABBIT SPEED (synced from training config)
# =============================================================================
RabbitSpeedNominal              = 16.0    # m/s - center of distribution
RabbitSpeedSigma                = 3.0     # m/s - 1σ deviation (0 = constant speed)
RabbitSpeedMin                  = 8.0     # m/s - hard floor
RabbitSpeedMax                  = 25.0    # m/s - hard ceiling
RabbitSpeedCycleMin             = 0.5     # seconds - min variation cycle
RabbitSpeedCycleMax             = 5.0     # seconds - max variation cycle

# random, classic, line, computedPaths, longSequential, aeroStandard, progressiveDistance
PathGeneratorMethod             = progressiveDistance
RandomPathSeedB                 = 13337

GPSeed                          = -1

MinisimPortOverride             = 0
MinisimProgram                  = ./crrcsim.sh
S3Bucket                        = autoc-eval-arm
; S3Profile                       = minio

# Evaluation mode: 1=bytecode verification
EvaluateMode                    = 1
BytecodeFile                    = gp_program.dat

# =============================================================================
# NODE SET REFERENCE (all available nodes)
# =============================================================================
# OUTPUTS (3):   SETPITCH, SETROLL, SETTHROTTLE
# PATH SENSORS (3): GETDPHI(step), GETDTHETA(step), GETDTARGET(step) - rabbit-relative errors
# NAV SENSORS (2):  GETDHOME - distance to origin; GETVEL - airspeed magnitude
# ATTITUDE (2):     GETROLL_RAD, GETPITCH_RAD - current attitude in radians
# AoA/SLIP (2):     GETALPHA - angle of attack; GETBETA - sideslip angle
# BODY VEL (3):     GETVELX, GETVELY, GETVELZ - NED velocity components
# TEMPORAL (4):     GETDPHI_PREV(n), GETDTHETA_PREV(n) - history; GETDPHI_RATE, GETDTHETA_RATE - derivatives
# MATH (4):         ADD, SUB, MUL, DIV
# MATH EXT (6):     CLAMP(x,lo,hi), ABS, SQRT, MIN, MAX, ATAN2
# TRIG (2):         SIN, COS
# LOGIC (3):        IF, GT, EQ
# CONSTANTS (4):    0, 1, 2, PI
# FLOW (1):         PROGN
# =============================================================================
# Currently enabled (25 nodes):
#   Base 23 + CLAMP + ABS (added to enable proportional control, reduce bang-bang)
# =============================================================================
TrainingNodes                   = SETPITCH,SETROLL,SETTHROTTLE,GETDPHI,GETDTHETA,GETDTARGET,GETDPHI_PREV,GETDTHETA_PREV,GETDPHI_RATE,GETDTHETA_RATE,ADD,SUB,MUL,DIV,IF,GT,0,1,2,PROGN,GETROLL_RAD,GETPITCH_RAD,GETVEL,CLAMP,ABS
