# autoc-eval.ini — NN evaluation mode
# Evaluates a saved weight file against scenarios.
# Use: ./build/autoc -i autoc-eval.ini
#
# Workflow:
#   1. Train with autoc.ini → weights saved to S3
#   2. Extract: ./build/nnextractor <s3_key> → nn_weights.dat
#   3. Eval:    ./build/autoc -i autoc-eval.ini
#   4. Results uploaded to S3 → view in renderer
#
# Typical eval scenarios:
#   - Repro: same PathGeneratorMethod + Seed as training (verify fitness match)
#   - Novel: different method/seed (test generalization)
#   - Stress: wider sigmas or unfamiliar wind conditions
#
# NOTE: Eval fitness computation uses aggregateRawFitness (RMSE sum),
# which differs from training's computeNNFitness (power-law penalty).
# See BACKLOG.md for details. The renderer shows the STORED training
# fitness from the .dmp file, not the eval-computed value.

# =============================================================================
# EVOLUTION PARAMETERS (not used in eval mode, but must be present for parsing)
# =============================================================================
PopulationSize                  = 1
NumberOfGenerations             = 1
CrossoverProbability            = 95
CreationProbability             = 5
TournamentSize                  = 5
SwapMutationProbability         = 15
AddBestToNewPopulation          = 1

# NN-specific (not used in eval, but parsed)
NNMutationSigma                 = 0.2
NNSigmaFloor                    = 0.05
NNCrossoverAlpha                = -1
NNInitMethod                    = xavier

# Selection strategy (not used in eval)
SelectionMode                   = lexicase

# =============================================================================
# SIMULATION
# =============================================================================
# SimNumPathsPerGeneration: how many paths to evaluate
#   aeroStandard has 5 paths (0-4): HorizontalOval, VerticalLoop,
#     FigureEight, FortyFiveDegreeAngledLoop, HighPerchSplitS
#   For single-path eval (progressive, longSequential, line): set to 1
SimNumPathsPerGeneration        = 1
EvalThreads                     = 8

# Path generation methods:
#   aeroStandard       — 5 fixed paths (racetrack, loops, figure-8, etc.)
#   progressiveDistance — single expanding-radius path (novel geometry)
#   longSequential     — long single path (duration/stability test)
#   random             — random waypoints (full generalization test)
#   computedPaths      — computed geometry (spirals, loops)
#   classic            — legacy path set
#   line               — simple straight line
PathGeneratorMethod             = progressiveDistance

# Seeded random path generation (for aeroStandard reproducibility)
# Must match training (autoc.ini) for exact repro; use different seed for novel
RandomPathSeedB                 = 13337

# RNG seed: controls wind seeds, entry variations, rabbit speed profiles
# Use training seed for exact repro, -1 for novel scenarios
Seed                            = 1775169677

# Minisim worker configuration
MinisimPortOverride             = 0
MinisimProgram                  = ./scripts/crrcsim.sh

# =============================================================================
# SCENARIO VARIATIONS
# =============================================================================
# WindScenarios: number of wind seeds per path
# Total evals = SimNumPathsPerGeneration × WindScenarios
# Training typically uses 49; eval can use fewer for quick checks
WindScenarios                   = 9

# Entry and wind variations (1=enabled, 0=disabled)
# Disable for clean baseline; enable to test robustness
EnableEntryVariations           = 1
EnableWindVariations            = 1

# Entry attitude sigmas (degrees for heading/roll, fraction for speed)
# Cone: nose direction deviates within a cone (no gimbal lock)
EntryConeSigma                  = 30        # half-angle of direction cone
EntryRollSigma                  = 30        # roll around body axis
EntrySpeedSigma                 = 0.1       # fraction (10%), NOT absolute m/s
WindDirectionSigma              = 45        # degrees

# Entry position sigma in meters (0=disabled, start at origin like xiao)
EntryPositionRadiusSigma        = 0
EntryPositionAltSigma           = 0

# Variation landscape ramp (0=disabled, >0 = gens per ramp step)
VariationRampStep               = 0

# =============================================================================
# VARIABLE RABBIT SPEED
# =============================================================================
# Sigma=0 for constant speed; >0 for time-varying speed profile per scenario
RabbitSpeedNominal              = 13.0      # m/s (real cruise with streamer, 50% power)
RabbitSpeedSigma                = 2.0       # m/s (68% within 11-15, real Vmax=17)
RabbitSpeedMin                  = 10.0      # m/s (well above stall ~7)
RabbitSpeedMax                  = 18.0      # m/s (real Vmax ~17, slight downhill margin)
RabbitSpeedCycleMin             = 3.0       # seconds (speed change period, min)
RabbitSpeedCycleMax             = 7.0       # seconds (speed change period, max)

# =============================================================================
# STORAGE
# =============================================================================
S3Bucket                        = autoc-eval-arm
; S3Profile                     = minio

# =============================================================================
# EVALUATION MODE
# =============================================================================
# 0 = normal NN evolution, 1 = evaluate saved weight file
EvaluateMode                    = 1
# Weight file: exported via nnextractor from training S3 artifact
NNWeightFile                    = nn_weights.dat

# =============================================================================
# DEMETIC GROUPING (not used in eval mode)
# =============================================================================
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
