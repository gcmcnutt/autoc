# autoc-eval.ini — NN evaluation mode configuration
# Loads a saved NN weight file and evaluates it against scenarios.
# Use: ./build/autoc -i autoc-eval.ini

# =============================================================================
# EVALUATION MODE
# =============================================================================
EvaluateMode                    = 1
NNWeightFile                    = nn_weights.dat

# =============================================================================
# EVOLUTION PARAMETERS (not used in eval mode, but parsed)
# =============================================================================
PopulationSize                  = 1
NumberOfGenerations             = 1
CrossoverProbability            = 90
CreationProbability             = 10
TournamentSize                  = 7
SwapMutationProbability         = 60
AddBestToNewPopulation          = 1
NNMutationSigma                 = 0.1
NNCrossoverAlpha                = -1
NNInitMethod                    = xavier

# =============================================================================
# SIMULATION
# =============================================================================
SimNumPathsPerGeneration        = 1
EvalThreads                     = 8

PathGeneratorMethod             = progressiveDistance
RandomPathSeedB                 = 13337

# Fixed seed for reproducible evaluation
Seed                          = 1773457786

MinisimPortOverride             = 0
MinisimProgram                  = ./crrcsim.sh

# =============================================================================
# SCENARIO VARIATIONS
# =============================================================================
WindScenarios                   = 49
EnableEntryVariations           = 0
EnableWindVariations            = 1

EntryHeadingSigma               = 45
EntryRollSigma                  = 22.5
EntryPitchSigma                 = 7.5
EntrySpeedSigma                 = 0.1
WindDirectionSigma              = 45
EntryPositionRadiusSigma        = 0
EntryPositionAltSigma           = 0
VariationRampStep               = 0

# =============================================================================
# VARIABLE RABBIT SPEED
# =============================================================================
RabbitSpeedNominal              = 16.0
RabbitSpeedSigma                = 3.0
RabbitSpeedMin                  = 8.0
RabbitSpeedMax                  = 25.0
RabbitSpeedCycleMin             = 0.5
RabbitSpeedCycleMax             = 5.0

# =============================================================================
# STORAGE
# =============================================================================
S3Bucket                        = autoc-eval-arm
; S3Profile                     = minio

# =============================================================================
# DEMETIC GROUPING (scenario assignment)
# =============================================================================
DemeticGrouping                 = 0
DemeSize                        = 1000
DemeticMigProbability           = 20
